# Fondo de pantalla cargado por hyprpaper (lanzado en el autostart de hyprland.lua)
preload = ~/config_files/wallpapers/arch-linux-wallpaper.png

# Monitor vacío = aplica a todos los monitores
wallpaper = , ~/config_files/wallpapers/arch-linux-wallpaper.png

# No mantener wallpapers no usados en memoria
ipc = off
