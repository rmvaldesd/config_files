general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    # Puedes usar un color sólido o una imagen de fondo
    color = rgba(25, 20, 20, 1.0) 
    # path = /home/tu_usuario/Pictures/wallpaper.png # Descomenta si quieres imagen
    blur_passes = 2
}

# RELOJ
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrains Mono
    placeholder_text = <i>Ingresa contraseña...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# TEXTO DEL RELOJ
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = JetBrains Mono Bold
    position = 0, 160
    halign = center
    valign = center
}
