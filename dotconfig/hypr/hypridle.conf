general {
    # Evita que se lancen múltiples instancias de bloqueo al mismo tiempo
    lock_cmd = pidof hyprlock || hyprlock       
    # Comando que se ejecuta antes de suspender el sistema (asegura que se bloquee primero)
    before_sleep_cmd = loginctl lock-session    
    # Comando que se ejecuta después de despertar del modo suspensión
    after_sleep_cmd = hyprctl dispatch dpms on  
}

# 1. Bajar el brillo de la pantalla (Ahorro de energía rápido)
listener {
    timeout = 150                                 # 2.5 minutos
    on_timeout = brightnessctl set 10%-           # Baja el brillo al 10%
    on_resume = brightnessctl set 100%            # Restaura el brillo al volver
}

# 2. Apagar las luces del teclado (Si tu laptop/teclado lo soporta)
listener { 
    timeout = 150                                 # 2.5 minutos
    on_timeout = brightnessctl -d *flinklight* set 0 # Apaga el backlight del teclado
    on_resume = brightnessctl -d *flinklight* set 1  # Lo vuelve a encender
}

# 3. Bloquear la pantalla de forma segura
listener {
    timeout = 300                                 # 5 minutos
    on_timeout = loginctl lock-session            # Lanza hyprlock mediante systemd/loginctl
}

# 4. Apagar la pantalla por completo (DPMS)
listener {
    timeout = 330                                 # 5.5 minutos (justo después de bloquear)
    on_timeout = hyprctl dispatch dpms off        # Apaga la señal de video del monitor
    on_resume = hyprctl dispatch dpms on          # Enciende la pantalla al mover el mouse/teclado
}

# 5. Suspender el equipo SOLO si está usando batería
listener {
    timeout = 600                                 # 10 minutos (600 segundos)
    # Verifica si el cargador está desconectado antes de suspender
    on_timeout = cat /sys/class/power_supply/AC/online | grep -q "0" && systemctl suspend
}
