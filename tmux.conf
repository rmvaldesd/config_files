# ─────────────────────────────────────────────────────────────
# Prefix: Ctrl-a (press twice to send a literal Ctrl-a)
# ─────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ─────────────────────────────────────────────────────────────
# PANES — create
# tmux's -h/-v flags are counter-intuitive, so think of it as:
#   VERTICAL   split = panes side by side  ( | divider ) -> tmux -h
#   HORIZONTAL split = panes stacked        ( — divider ) -> tmux -v
# New panes open in the CURRENT pane's directory.
# ─────────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # vertical   (side by side)
bind v split-window -h -c "#{pane_current_path}"   # vertical   (letter alias)
bind - split-window -v -c "#{pane_current_path}"   # horizontal (top / bottom)
bind o split-window -v -c "#{pane_current_path}"   # horizontal (letter alias)

# ─────────────────────────────────────────────────────────────
# PANES — move (vim keys: h/j/k/l), repeatable
# ─────────────────────────────────────────────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ─────────────────────────────────────────────────────────────
# PANES — resize (vim keys + Shift: H/J/K/L), repeatable
# ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─────────────────────────────────────────────────────────────
# WINDOWS — create / move
# ─────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"        # new window (current dir)
bind -r n next-window                              # next window
bind -r p previous-window                          # previous window
bind Tab last-window                               # toggle last window
# prefix + <0-9> jumps to window N (tmux default)

# ─────────────────────────────────────────────────────────────
# OVERVIEW — see windows / panes / sessions
# ─────────────────────────────────────────────────────────────
bind w choose-tree -Zw                             # windows + panes picker
bind s choose-tree -Zs                             # sessions picker
bind q display-panes                               # show pane numbers (press N)
set -g display-panes-time 2000

# ─────────────────────────────────────────────────────────────
# Project picker (tplm) — moved off `l` so `l` navigates panes
# ─────────────────────────────────────────────────────────────
bind P display-popup -E -w 80% -h 60% "tplm picker"

# ─────────────────────────────────────────────────────────────
# Reload config
# ─────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# ─────────────────────────────────────────────────────────────
# Options
# ─────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 10000
set -g allow-passthrough on
set-window-option -g mode-keys vi
set -s set-clipboard on
set -as terminal-features ',xterm-256color:clipboard:Tc:Ss=\E[%p1%d q:Se=\E[2 q'
